<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tmux Web</title>
    <style>
        body { font-family: sans-serif; margin: 20px; display: flex; flex-direction: column; gap: 20px; }
        .container { display: flex; gap: 20px; }
        .sidebar, .main { flex: 1; min-width: 300px; }
        .session-list { background: #f4f4f4; padding: 10px; border-radius: 4px; min-height: 200px; }
        .session-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #ddd; }
        .error { color: red; } .success { color: green; }
        .terminal { background: #000; color: #0f0; font-family: monospace; padding: 15px; border-radius: 4px; height: 400px; overflow: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Tmux Web</h1>
    <div>
        <input type="text" id="sName" placeholder="Session Name">
        <button onclick="createSession()">Create</button>
        <button onclick="fetchSessions()">Refresh</button>
        <div id="msg"></div>
    </div>
    <div class="container">
        <div class="sidebar">
            <h2>Sessions</h2>
            <div id="sessions" class="session-list"></div>
        </div>
        <div class="main">
            <h2 id="output-title">Output</h2>
            <div id="terminal" class="terminal">Select a session</div>
            <div style="margin-top: 10px; display: flex; gap: 10px; align-items: center;">
                <input type="text" id="cmd" placeholder="Command" style="flex: 1;" onkeydown="if(event.key === 'Enter') sendCmd(true)">
                <button onclick="sendCmd(false)">Send</button>
                <select id="specialKey">
                    <option value="Enter">Enter</option>
                    <option value="C-c">Ctrl+C</option>
                    <option value="C-d">Ctrl+D</option>
                    <option value="Esc">Esc</option>
                    <option value="Tab">Tab</option>
                </select>
                <button onclick="sendSpecial()">Send Key</button>
            </div>
        </div>
    </div>
    <script>
        let cur = null;
        const $ = id => document.getElementById(id);
        const msg = (t, cls) => { $('msg').innerHTML = `<p class="${cls}">${t}</p>`; };

        async function fetchSessions() {
            try {
                const res = await fetch('/api/sessions');
                const { sessions } = await res.json();
                if (!sessions?.length) { $('sessions').textContent = 'No sessions'; return; }
                $('sessions').innerHTML = sessions.map(s => `<div class="session-item"><span>${s}</span><button onclick="select('${s}')">View</button></div>`).join('');
            } catch (e) { $('sessions').textContent = 'Error'; }
            if (cur) fetchOutput();
        }

        async function fetchOutput() {
            if (!cur) return;
            try {
                const sz = await fetch(`/api/session/size/${cur}`).then(r => r.json());
                if (sz.width) $('terminal').style.width = `${sz.width}ch`;
                const res = await fetch(`/api/session/output/${cur}`).then(r => r.json());
                $('terminal').textContent = res.output || 'No output';
            } catch (e) { $('terminal').textContent = 'Error'; }
        }

        function select(s) { cur = s; $('terminal').textContent = 'Connecting...'; fetchOutput(); }

        async function createSession() {
            const name = $('sName').value.trim();
            if (!name) return msg('Enter name', 'error');
            msg('Creating...', '');
            try {
                const res = await fetch('/api/session', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name })
                });
                const data = await res.json();
                res.ok ? (msg(data.message, 'success'), $('sName').value = '', fetchSessions()) : msg(data.error, 'error');
            } catch (e) { msg(e.message, 'error'); }
        }

        async function sendCmd(appendEnter) {
            let cmd = $('cmd').value.trim();
            if (!cmd || !cur) return;
            if (appendEnter) cmd += ' Enter';
            try {
                const res = await fetch(`/api/session/${cur}/send`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ key: cmd })
                });
                if (!res.ok) throw new Error((await res.json()).error);
                $('cmd').value = '';
            } catch (e) { msg(e.message, 'error'); }
        }

        async function sendSpecial() {
            const key = $('specialKey').value;
            if (!cur) return;
            try {
                const res = await fetch(`/api/session/${cur}/send`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ key })
                });
                if (!res.ok) throw new Error((await res.json()).error);
            } catch (e) { msg(e.message, 'error'); }
        }

        fetchSessions();
        setInterval(fetchSessions, 1000);
    </script>
</body>
</html>
